algo: ppo                 # {ppo, maskable_ppo}
total_env_steps: 32768  # budżet kroków agenta
vec_env_n: 16
eval:
 every_env_steps: 1024
 n_games: 1000
seeds: [0, 1, 2]
ppo:
 policy: "MlpPolicy"
 net_arch: [64, 64]
 learning_rate: 3.0e-4
 n_steps: 64
 batch_size: 64
 gamma: 0.99
 gae_lambda: 0.95
 clip_range: 0.2
 ent_coef: 0.01
 vf_coef: 0.5
 max_grad_norm: 0.5